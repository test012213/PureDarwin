name: Build PureDarwin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-xnu:
    # Use a modern, actively supported runner environment
    runs-on: macos-15

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Select Xcode Version
      run: |
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        xcodebuild -version

    - name: Install Dependencies
      run: |
        brew install base64 ninja cmake openssl

    - name: Configure CMake with Legacy Flags
      run: |
        mkdir build
        cd build
        # Pass CXX flags to tolerate legacy structural code design rules
        cmake -G Ninja \
          -DOPENSSL_ROOT_DIR=/opt/homebrew/opt/openssl@3 \
          -DCMAKE_CXX_FLAGS="-Wno-error=delete-non-virtual-dtor -Wno-error=c++11-extensions" \
          ..

    - name: Build Project
      run: |
        cd build
        ninja

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: puredarwin-compiled-output
        path: build/
        if-no-files-found: warn
