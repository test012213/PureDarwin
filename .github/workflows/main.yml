name: PureDarwin Native Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  DEBIAN_FRONTEND: noninteractive
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  build-puredarwin:
    name: Build PureDarwin
    runs-on: macos-15-intel

    timeout-minutes: 360

    strategy:
      fail-fast: false

    steps:

      ####################################################################
      # CHECKOUT
      ####################################################################

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      ####################################################################
      # SYSTEM INFO
      ####################################################################

      - name: System information
        run: |
          echo "==== macOS Version ===="
          sw_vers

          echo
          echo "==== Kernel ===="
          uname -a

          echo
          echo "==== CPU ===="
          sysctl machdep.cpu.brand_string || true

          echo
          echo "==== Disk Space ===="
          df -h

      ####################################################################
      # XCODE
      ####################################################################

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app

          xcodebuild -version

      - name: Accept Xcode license
        run: |
          sudo xcodebuild -license accept || true

      ####################################################################
      # HOMEBREW
      ####################################################################

      - name: Update Homebrew
        run: |
          brew update

      - name: Install dependencies
        run: |
          brew install \
            llvm \
            cmake \
            ninja \
            meson \
            automake \
            autoconf \
            libtool \
            pkg-config \
            coreutils \
            gnu-sed \
            wget \
            python \
            qemu \
            cdrtools \
            bison \
            flex \
            texinfo \
            m4

      ####################################################################
      # ENVIRONMENT
      ####################################################################

      - name: Setup environment
        run: |
          echo "/usr/local/opt/llvm/bin" >> $GITHUB_PATH
          echo "/opt/homebrew/opt/llvm/bin" >> $GITHUB_PATH

          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV

          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV

          echo "CFLAGS=-O2" >> $GITHUB_ENV
          echo "CXXFLAGS=-O2" >> $GITHUB_ENV

      ####################################################################
      # TOOLCHAIN CHECK
      ####################################################################

      - name: Verify toolchain
        run: |
          echo "==== clang ===="
          clang --version

          echo
          echo "==== ld ===="
          ld -v

          echo
          echo "==== SDK ===="
          xcrun --show-sdk-path

          echo
          echo "==== cmake ===="
          cmake --version

          echo
          echo "==== ninja ===="
          ninja --version

      ####################################################################
      # CLEANUP
      ####################################################################

      - name: Cleanup previous builds
        run: |
          rm -rf build || true
          rm -rf out || true
          rm -rf artifacts || true

      ####################################################################
      # BOOTSTRAP
      ####################################################################

      - name: Bootstrap project
        run: |
          chmod +x bootstrap.sh || true
          ./bootstrap.sh || true

      ####################################################################
      # CONFIGURE
      ####################################################################

      - name: Configure build
        run: |
          mkdir -p build
          cd build

          cmake .. \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY

      ####################################################################
      # BUILD
      ####################################################################

      - name: Build PureDarwin
        run: |
          cd build

          ninja -j$(sysctl -n hw.ncpu) || \
          make -j$(sysctl -n hw.ncpu)

      ####################################################################
      # OPTIONAL XNU BUILD
      ####################################################################

      - name: Build XNU kernel
        continue-on-error: true
        run: |
          if [ -d xnu ]; then
            cd xnu

            make \
              SDKROOT=macosx \
              ARCH_CONFIGS=X86_64 \
              KERNEL_CONFIGS=RELEASE \
              MACHINE_CONFIGS=VMAPPLE \
              -j$(sysctl -n hw.ncpu)
          else
            echo "No xnu directory found."
          fi

      ####################################################################
      # ARTIFACT PREP
      ####################################################################

      - name: Prepare artifacts
        if: always()
        run: |
          mkdir -p artifacts

          ##################################################################
          # COPY BUILD OUTPUTS
          ##################################################################

          cp -R build artifacts/build || true

          ##################################################################
          # COPY XNU OUTPUTS
          ##################################################################

          cp -R xnu artifacts/xnu || true

          ##################################################################
          # COPY TOOLS
          ##################################################################

          cp -R tools artifacts/tools || true

          ##################################################################
          # COPY LOGS
          ##################################################################

          find . \( \
            -name "*.log" -o \
            -name "CMakeError.log" -o \
            -name "CMakeOutput.log" \
          \) -exec cp --parents {} artifacts/ \; || true

          ##################################################################
          # SYSTEM INFO
          ##################################################################

          sw_vers > artifacts/system-info.txt || true
          uname -a >> artifacts/system-info.txt || true

      ####################################################################
      # CREATE DISK IMAGE
      ####################################################################

      - name: Create DMG image
        continue-on-error: true
        run: |
          mkdir -p dmg-root

          echo "PureDarwin Build Artifact" > dmg-root/README.txt

          cp -R build dmg-root/build || true

          hdiutil create \
            -size 8g \
            -fs HFS+ \
            -volname PureDarwin \
            -srcfolder dmg-root \
            artifacts/PureDarwin.dmg

      ####################################################################
      # CREATE QCOW2 IMAGE
      ####################################################################

      - name: Create QEMU disk
        continue-on-error: true
        run: |
          qemu-img create \
            -f qcow2 \
            artifacts/PureDarwin.qcow2 \
            8G

      ####################################################################
      # BUILD SUMMARY
      ####################################################################

      - name: Generate summary
        if: always()
        run: |
          echo "# PureDarwin Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Environment" >> $GITHUB_STEP_SUMMARY
          echo "- macOS runner" >> $GITHUB_STEP_SUMMARY
          echo "- Xcode toolchain" >> $GITHUB_STEP_SUMMARY
          echo "- Ninja build system" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Outputs" >> $GITHUB_STEP_SUMMARY
          echo "- Build directory" >> $GITHUB_STEP_SUMMARY
          echo "- Logs" >> $GITHUB_STEP_SUMMARY
          echo "- DMG image" >> $GITHUB_STEP_SUMMARY
          echo "- QCOW2 image" >> $GITHUB_STEP_SUMMARY

      ####################################################################
      # UPLOAD ARTIFACTS
      ####################################################################

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PureDarwin-artifacts
          retention-days: 30
          path: |
            artifacts/
