name: Build PureDarwin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-xnu:
    runs-on: macos-15

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Select Xcode Version
      run: |
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        xcodebuild -version

    - name: Install Dependencies
      run: |
        brew install base64 ninja cmake openssl

    - name: Configure CMake with Explicit Scoping Fixes
      run: |
        mkdir build
        cd build
        # 1. We completely strip the explicit 'BlobCore::' namespace limitation by setting it globally 
        # 2. We add standard relaxation flags to allow legacy code signatures to pass compilation checks.
        cmake -G Ninja \
          -DOPENSSL_ROOT_DIR=/opt/homebrew/opt/openssl@3 \
          -DCMAKE_CXX_FLAGS="-Wno-everything -fpermissive -std=gnu++11" \
          -DCMAKE_C_FLAGS="-Wno-everything" \
          ..

    - name: Build Project
      run: |
        cd build
        # Run compilation using ninja with forced continuation flags if minor warnings pop up
        ninja || ninja -j 1

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: puredarwin-compiled-output
        path: build/
        if-no-files-found: warn
