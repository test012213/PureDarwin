name: Build PureDarwin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-xnu:
    runs-on: macos-15

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Select Xcode Version
      run: |
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        xcodebuild -version

    - name: Install Dependencies
      run: |
        brew install base64 ninja cmake openssl

    # Fix the missing namespace member bug via inline code patching
    - name: Patch Code Sign Blobs Error
      run: |
        TARGET_FILE="tools/cctools/ld64/src/ld/code-sign-blobs/blob.h"
        echo "Patching legacy structure error inside $TARGET_FILE..."
        
        # Replaces 'this->BlobCore::clone()' with '(BlobCore*)this->clone()' or matching standard layout 
        # By removing the restrictive explicit parent namespace scope qualifier that confuses modern Clang
        sed -i '' 's/this->BlobCore::clone()/((BlobCore\*)this)->clone()/g' "$TARGET_FILE"

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake -G Ninja -DOPENSSL_ROOT_DIR=/opt/homebrew/opt/openssl@3 ..

    - name: Build Project
      run: |
        cd build
        ninja

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: puredarwin-compiled-output
        path: build/
        if-no-files-found: warn
