name: Build PureDarwin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-xnu:
    runs-on: macos-15

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Select Xcode Version
      run: |
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        xcodebuild -version

    - name: Install Dependencies
      run: |
        brew install base64 ninja cmake openssl

    # CRITICAL: This patch MUST run BEFORE 'mkdir build' or 'cmake'
    - name: Patch Legacy Scoping Error in ld64
      run: |
        TARGET_FILE="tools/cctools/ld64/src/ld/code-sign-blobs/blob.h"
        echo "Applying targeted fix to $TARGET_FILE..."
        
        # Verify file presence before patching
        if [ -f "$TARGET_FILE" ]; then
          # Strips out 'this->BlobCore::' so Clang performs a normal member lookup on the object instance
          sed -i '' 's/this->BlobCore::clone()/this->clone()/g' "$TARGET_FILE"
          echo "Patch successfully injected into blob.h"
        else
          echo "ERROR: Target file not found at $TARGET_FILE"
          exit 1
        fi

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake -G Ninja \
          -DOPENSSL_ROOT_DIR=/opt/homebrew/opt/openssl@3 \
          -DCMAKE_CXX_FLAGS="-Wno-everything -std=gnu++11" \
          -DCMAKE_C_FLAGS="-Wno-everything" \
          ..

    - name: Build Project
      run: |
        cd build
        ninja

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: puredarwin-compiled-output
        path: build/
        if-no-files-found: warn
