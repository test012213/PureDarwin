name: Build PureDarwin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-xnu:
    runs-on: macos-15

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Select Xcode Version
      run: |
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        xcodebuild -version

    - name: Install Dependencies
      run: |
        brew install base64 ninja cmake openssl

    # FIX #1: The patch for the ld64 linker code signature loop we fixed earlier
    - name: Patch Legacy Scoping Error in ld64
      run: |
        TARGET_FILE="tools/cctools/ld64/src/ld/code-sign-blobs/blob.h"
        if [ -f "$TARGET_FILE" ]; then
          sed -i '' 's/this->BlobCore::clone()/this->clone()/g' "$TARGET_FILE"
          echo "Patch 1 successfully injected into blob.h"
        fi

    # FIX #2: Force the PCI Bit Range Macro to execute safely inside 64-bit integer registers
    - name: Patch PCI Family 32-Bit Bitshift Overflow
      run: |
        PCI_FILE="src/Kernel/Extensions/IOPCIFamily/include/IOKit/apiodma/ApplePIODMADefinitions.h"
        echo "Applying 64-bit casting safety fix to $PCI_FILE..."
        
        if [ -f "$PCI_FILE" ]; then
          # Swaps '(uint32_t)(1)' inside the macro logic with '(uint64_t)(1)' to handle bits up to 63 cleanly
          sed -i '' 's/(uint32_t)(1)/(uint64_t)(1)/g' "$PCI_FILE"
          echo "Patch 2 successfully injected into ApplePIODMADefinitions.h"
        else
          echo "ERROR: Target file not found at $PCI_FILE"
          exit 1
        fi

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake -G Ninja \
          -DOPENSSL_ROOT_DIR=/opt/homebrew/opt/openssl@3 \
          -DCMAKE_CXX_FLAGS="-Wno-everything -std=gnu++11" \
          -DCMAKE_C_FLAGS="-Wno-everything" \
          ..

    - name: Build Project
      run: |
        cd build
        ninja

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: puredarwin-compiled-output
        path: build/
        if-no-files-found: warn
