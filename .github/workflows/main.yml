name: Build PureDarwin XNU Kernel

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build-xnu:
    runs-on: macos-latest

    steps:
    # 1. Check out the repository source code
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Select the correct Xcode version
    - name: Select Xcode Version
      run: |
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        xcodebuild -version

    # 3. Download and install build dependencies via Homebrew
    - name: Install Dependencies
      run: |
        brew install base64 ninja cmake

    # 4. Grant permission and execute the official PureDarwin xnubuild script
    - name: Run XNU Build Script
      run: |
        chmod +x xnubuild.sh
        ./xnubuild.sh -travis

    # 5. Extract and upload the finished kernel binary as a downloadable file
    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: puredarwin-xnu-kernel
        path: |
          build/
          BUILD/
        if-no-files-found: warn
