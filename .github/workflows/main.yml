name: Build PureDarwin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build-xnu:
    # Downgrade to macOS 13 to use a compatible legacy Clang compiler environment
    runs-on: macos-13

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # Force select Xcode 14.3.1 toolchain paths 
    - name: Select Legacy Xcode Version
      run: |
        sudo xcode-select -s /Applications/Xcode_14.3.1.app/Contents/Developer
        xcodebuild -version

    - name: Install Dependencies
      run: |
        brew install base64 ninja cmake openssl

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        # Specify OpenSSL root flags for the Homebrew environment path layout
        cmake -G Ninja -DOPENSSL_ROOT_DIR=/usr/local/opt/openssl@3 ..

    - name: Build Project
      run: |
        cd build
        ninja

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: puredarwin-compiled-output
        path: build/
        if-no-files-found: warn
