name: PureDarwin Native Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  build-puredarwin:
    name: Build PureDarwin
    runs-on: macos-15-intel

    strategy:
      fail-fast: false

    steps:

      ###########################################################
      # Checkout
      ###########################################################

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      ###########################################################
      # System Info
      ###########################################################

      - name: System Information
        run: |
          sw_vers
          uname -a
          sysctl machdep.cpu.brand_string

      ###########################################################
      # Select Xcode
      ###########################################################

      - name: Select latest Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app

          xcodebuild -version

      ###########################################################
      # Accept license
      ###########################################################

      - name: Accept Xcode license
        run: |
          sudo xcodebuild -license accept || true

      ###########################################################
      # Install dependencies
      ###########################################################

      - name: Install Homebrew packages
        run: |
          brew update

          brew install \
            llvm \
            cmake \
            ninja \
            meson \
            automake \
            autoconf \
            libtool \
            pkg-config \
            gnu-sed \
            wget \
            python \
            qemu \
            cdrtools \
            coreutils \
            bison \
            flex

      ###########################################################
      # Setup environment
      ###########################################################

      - name: Setup build environment
        run: |
          echo "/usr/local/opt/llvm/bin" >> $GITHUB_PATH

          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV

          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV

      ###########################################################
      # Verify toolchain
      ###########################################################

      - name: Verify Apple toolchain
        run: |
          clang --version
          ld -v
          xcrun --show-sdk-path

      ###########################################################
      # Bootstrap PureDarwin
      ###########################################################

      - name: Bootstrap build system
        run: |
          chmod +x ./bootstrap.sh || true
          ./bootstrap.sh || true

      ###########################################################
      # Configure
      ###########################################################

      - name: Configure PureDarwin
        run: |
          mkdir -p build
          cd build

          cmake .. \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_OSX_ARCHITECTURES=x86_64

      ###########################################################
      # Build userland
      ###########################################################

      - name: Build Userland
        run: |
          cd build

          ninja -j$(sysctl -n hw.ncpu) || \
          make -j$(sysctl -n hw.ncpu)

      ###########################################################
      # Build XNU
      ###########################################################

      - name: Build XNU kernel
        run: |
          if [ -d xnu ]; then
            cd xnu

            make \
              SDKROOT=macosx \
              ARCH_CONFIGS=X86_64 \
              KERNEL_CONFIGS=RELEASE \
              MACHINE_CONFIGS=VMAPPLE \
              || true
          fi

      ###########################################################
      # Create Bootable Image
      ###########################################################

      - name: Create disk image
        run: |
          mkdir -p artifact/rootfs

          cp -R build artifact/rootfs/build || true

          hdiutil create \
            -size 8g \
            -fs HFS+ \
            -volname PureDarwin \
            artifact/PureDarwin.dmg

      ###########################################################
      # Optional QEMU image
      ###########################################################

      - name: Create QEMU image
        run: |
          qemu-img create \
            -f qcow2 \
            artifact/PureDarwin.qcow2 \
            8G

      ###########################################################
      # Upload artifacts
      ###########################################################

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PureDarwin-artifacts
          path: artifact/
